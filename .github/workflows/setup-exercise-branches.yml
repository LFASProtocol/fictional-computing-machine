**Screenshots**
If applicable, add screenshots to help explain your problem.

**Additional context**
Add any other context about the problem here.
BUG_REPORT
          cat > .github/ISSUE_TEMPLATE/feature_request.md << 'FEATURE_REQUEST'
---
name: Feature request
about: Suggest an idea for this project
title: ''
labels: enhancement
assignees: ''

---

**Is your feature request related to a problem? Please describe.**
A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]

**Describe the solution you'd like**
A clear and concise description of what you want to happen.

**Describe alternatives you've considered**
A clear and concise description of any alternative solutions or features you've considered.

**Additional context**
Add any other context or screenshots about the feature request here.
FEATURE_REQUEST
          git add .github/ISSUE_TEMPLATE/
          git commit -m "Add issue templates for bug reports and feature requests"
          git push origin add-issue-templates

      - name: Wait for Step 3 workflow to complete
        if: steps.check_setup.outputs.already_setup == 'false'
        run: |
          echo "Waiting 90 seconds for Step 3 workflow to trigger and complete..."
          sleep 90

      # -------------------------------------------------------
      # STEP 4: Add dependabot.yml and SECURITY.md
      # -------------------------------------------------------
      - name: Add dependabot.yml and SECURITY.md to prepare-to-collaborate
        if: steps.check_setup.outputs.already_setup == 'false'
        run: |
          git checkout prepare-to-collaborate
          cat > .github/dependabot.yml << 'DEPENDABOT'
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
DEPENDABOT
          cat > SECURITY.md << 'SECURITY'
# Mergington High School Security Policy

## Reporting a Vulnerability

At Mergington High, we take the security of our Extra-Curricular Activities website seriously, especially
since it contains student information. If you discover a security vulnerability, please follow these steps:

1. **Do not** create an issue on this repository, disclose the vulnerability publicly, or discuss it with other teachers/students.
1. In the top navigation of this repository, click the **Security** tab.
1. In the top right, click the **Report a vulnerability** button.
1. Fill out the provided form. It will request information like:
   - A description of the vulnerability
   - Steps to reproduce the issue
   - Potential impact on student data or website functionality
   - Suggested fix (if you have one)
1. Email the IT Club faculty advisor at techsupport@mergingtonhigh.example.edu and inform them you have made a report. **Do not** include any vulnerability details.

## Response Timeline

- We will acknowledge receipt of your report within 2 school days
- We will provide an initial assessment within 5 school days
- Critical issues affecting student data will be addressed immediately
- We will create a private fork to solve the issue and invite you as a collaborator so you can see our progress and contribute.

## Thank You

Your help in keeping our school's digital resources secure is greatly appreciated!
Responsible disclosure of security vulnerabilities helps protect our entire school community.
SECURITY
          git add .github/dependabot.yml SECURITY.md
          git commit -m "Add dependabot.yml and SECURITY.md"
          git push origin prepare-to-collaborate

      - name: Wait for Step 4 workflow to complete
        if: steps.check_setup.outputs.already_setup == 'false'
        run: |
          echo "Waiting 90 seconds for Step 4 workflow to trigger and complete..."
          sleep 90

      # -------------------------------------------------------
      # STEP 5: Create PRs and merge them
      # -------------------------------------------------------
      - name: Create PR for prepare-to-collaborate
        if: steps.check_setup.outputs.already_setup == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Prepare to collaborate" \
            --body "Adding repository management and collaboration files:
          - .gitignore
          - CONTRIBUTING.md
          - CODEOWNERS
          - CODE_OF_CONDUCT.md
          - .github/dependabot.yml
          - SECURITY.md" \
            --head prepare-to-collaborate \
            --base main || echo "PR may already exist or failed to create"

      - name: Create PR for add-issue-templates
        if: steps.check_setup.outputs.already_setup == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Add issue templates" \
            --body "Adding standardized issue templates for bug reports and feature requests." \
            --head add-issue-templates \
            --base main || echo "PR may already exist or failed to create"

      - name: Wait for PRs to be created and checks to pass
        if: steps.check_setup.outputs.already_setup == 'false'
        run: |
          echo "Waiting 30 seconds for PRs to be ready..."
          sleep 30

      - name: Merge PR for prepare-to-collaborate
        if: steps.check_setup.outputs.already_setup == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge prepare-to-collaborate \
            --merge \
            --subject "Merge prepare-to-collaborate: add repository management files" \
            --admin || echo "PR merge may have failed or already been merged"

      - name: Wait before merging second PR
        if: steps.check_setup.outputs.already_setup == 'false'
        run: |
          echo "Waiting 30 seconds before merging second PR..."
          sleep 30

      - name: Merge PR for add-issue-templates
        if: steps.check_setup.outputs.already_setup == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge add-issue-templates \
            --merge \
            --subject "Merge add-issue-templates: add issue templates" \
            --admin || echo "PR merge may have failed or already been merged"

      - name: Exercise setup complete
        run: |
          echo "✅ Exercise branch setup complete!"
          echo "The following branches were created and pushed:"
          echo "  - prepare-to-collaborate (with .gitignore, CONTRIBUTING.md, CODEOWNERS, CODE_OF_CONDUCT.md, dependabot.yml, SECURITY.md)"
          echo "  - add-issue-templates (with bug_report.md and feature_request.md)"
          echo "Both PRs have been created and merged to main."
